caveats:
  - >-
    Thorne Catalyte NSF Certified for Sport status is verified via listing id 1286726. Supplement Facts locked via
    Vitacost retailer mirror (UPC 693749006299) — official thorne.com label image should be re-captured before
    publication. Formula includes taurine, B vitamins, and other nutrients beyond core electrolytes. Minor calorie/sugar
    variance may appear across NSF database vs retailer SFP mirrors.
  - >-
    LMNT Citrus Salt lists 1,000 mg sodium per stick with 0 g sugar. High sodium may be inappropriate for some people
    managing blood pressure, kidney disease, heart disease, fluid restrictions, or certain medications — NIH sodium
    context only, not product recommendation. No verified third-party sport certification captured. Keto/fasting brand
    copy is not endorsed by SuppCheckr.
  - >-
    Ultima Replenisher Lemonade lists 55 mg sodium per stick with 0 g sugar and broad mineral disclosure. Added vitamins
    and minerals (vitamin C, zinc, manganese, phosphorus) beyond core electrolytes. Low sodium is a label attribute, not
    dehydration treatment positioning. No verified third-party certification captured.
  - >-
    Nuun Sport Lemon Lime discloses sodium, potassium, magnesium, calcium, and chloride per tablet with 1 g sugar from
    dextrose. Tablet dissolve step adds serving friction. Brand rehydration copy is not performance or illness-treatment
    framing. No verified third-party certification captured. Lowest observed $/serving ($0.75) at 2026-07-15 check.
  - >-
    Liquid I.V. Hydration Multiplier lists 500 mg sodium, 370 mg potassium, and 11 g sugars per stick. Magnesium is not
    disclosed on the cited US Nutrition Facts panel — documented as not disclosed, not zero. Hydration Multiplier and
    faster-hydration marketing carry high claim-risk; SuppCheckr cites label facts only. No verified third-party
    certification captured.
  - >-
    All five products in this comparison are draft/noindex with affiliate.enabled false. No Amazon affiliate links or
    ASINs in Phase 14D. Product images remain branded placeholders.
  - >-
    Phase 14C price context (2026-07-15): Nuun $7.49, Ultima $20.99, Thorne Target $34.00, LMNT $45.00, Liquid I.V.
    $24.99. Verify current price at the retailer before purchase.
