      - third-party tested
caveats:
  - >-
    Nutricost and BulkSupplements third-party testing remains claimed unless a batch COA or recognized certificate URL
    is captured.
  - >-
    NOW Sports capsules provide 4.5 g creatine monohydrate per six-capsule serving; price per 5 g is normalized in
    product YAML and the table.
  - >-
    BulkSupplements label includes 5 g Supplement Facts serving and separate 7 g direction language — see product review
    for context.
  - Optimum Nutrition entry is scoped to the 600 g / 120-serving unflavored SKU only.
  - All prices are manually observed on 2026-06-26 — check current price at the retailer.
