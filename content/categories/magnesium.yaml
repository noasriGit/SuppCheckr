intro: >
  Magnesium is an essential mineral found in many foods and sold in several supplemental forms — glycinate, citrate,
  malate, oxide, and others. According to NIH Office of Dietary Supplements materials, many people do not meet recommended
  intake from food alone, but supplements add intake on top of diet and should be evaluated with label clarity in mind.
  SuppCheckr educational guides explain forms and safety context; future product reviews will compare elemental magnesium
  per serving, not compound weight alone.
evaluationSummary: >
  When magnesium product reviews are published, SuppCheckr will score products using label transparency (especially
  elemental magnesium disclosure), form identification, formula simplicity, third-party testing documentation (verified vs.
  marketing-only claims), dated manual price value (including price per 100 mg elemental magnesium), additives, and brand
  transparency. Scores reflect label and sourcing quality — not personal outcomes. SuppCheckr does not rank magnesium
  products for sleep, anxiety, constipation, blood pressure, migraines, cognition, or any medical condition.
clusterScopeNote: >
  Magnesium V1 planning targets five product reviews across distinct form buckets (glycinate, citrate, malate or
  transparent mixed-form, conditional L-threonate or fallback, and budget oxide). Draft product YAML and a draft
  category comparison table (magnesium-supplements-compared) exist; publication and indexing are deferred to later phases.
  Chloride, taurate, gummies, and topical products are guide-only for now. No L-threonate product review is included.
buyingConsiderations:
  - >-
    Confirm the Supplement Facts panel lists elemental magnesium (mg) per serving — not compound or chelate weight alone.
  - Identify the magnesium form (glycinate, citrate, malate, oxide, etc.) and read marketing claims conservatively.
  - >-
    Check whether third-party testing is verified (certificate or recognized program listing) or only claimed in
    marketing copy.
  - Compare value using price per 100 mg elemental magnesium when servings are disclosed clearly.
  - >-
    Consider total dietary magnesium from food plus any supplemental intake; NIH publishes RDAs and a supplemental UL for
    adults.
  - >-
    Consult a qualified healthcare professional before starting or changing supplements, especially if pregnant, nursing,
    under 18, taking medication, managing kidney disease, or managing a medical condition.
faq:
  - question: Why does SuppCheckr emphasize elemental magnesium on labels?
    answer: >
      Different magnesium salts and chelates contain different amounts of elemental magnesium per unit weight. Comparing
      products by compound weight alone can mislead; elemental mg per serving supports apples-to-apples dose and value
      comparisons.
  - question: Does a higher SuppCheckr score mean a magnesium product will work for me?
    answer: >
      No. Scores summarize label transparency, testing documentation, and dated price context using our methodology —
      not personal medical suitability or outcome guarantees.
  - question: Which magnesium form is best for sleep or anxiety?
    answer: >
      SuppCheckr does not rank magnesium products for sleep, anxiety, or any medical condition. Our guides describe common
      form differences for label literacy only. Consult a qualified healthcare professional for personal medical questions.
