id: electrolytes
slug: electrolytes
name: Electrolytes
commonForms:
  - Sodium (e.g., sodium chloride, sodium citrate, sodium bicarbonate)
  - Potassium (e.g., potassium citrate, potassium chloride, potassium phosphate)
  - Magnesium (e.g., magnesium malate, magnesium citrate, magnesium oxide)
  - Calcium (e.g., calcium citrate, calcium lactate — when disclosed on labels)
  - Chloride (e.g., from sodium chloride or potassium chloride — when disclosed in mg)
  - Electrolyte drink mix (powder/stick)
  - Electrolyte tablet
  - Ready-to-drink electrolyte beverage
categories:
  - electrolytes
aliases:
  - Electrolyte minerals
  - Electrolyte drink mix
evidenceSummary: >
  Electrolytes commonly refer to minerals such as sodium, potassium, magnesium, calcium, and chloride that play roles in
  normal body processes, including fluid balance and nerve and muscle function. According to NIH Office of Dietary
  Supplements materials, sodium, potassium, and magnesium are found in foods and may also appear in electrolyte drink
  mixes, powders, tablets, and beverages. Calcium and chloride appear on some — but not all — product labels as separate
  mg lines. Product labels vary widely in sodium level (from tens to thousands of mg per serving), potassium and magnesium
  amounts, sugar content, sweeteners, and serving format (stick, tablet, scoop). Comparing products requires checking how
  much of each mineral a serving provides, whether sugar or sweeteners are present, and whether third-party testing is
  verified or only claimed. SuppCheckr summarizes label and product-comparison information in electrolyte reviews,
  guides, and the electrolyte-supplements-compared table — not medical advice. SuppCheckr does not rank electrolyte
  products for dehydration treatment, illness recovery, hangover prevention, cramp prevention, athletic performance
  outcomes, pregnancy, children, or any medical condition.
typicalDosageRange: >
  NIH health-professional materials publish Adequate Intakes (AIs) and related guidance for sodium, potassium, and
  magnesium by age, sex, and life stage. Electrolyte drink mix serving sizes and mineral amounts per serving differ
  widely by brand and formula — from high-sodium, sugar-free sticks to sugar-containing hydration mixes. Dietary intake
  from food plus any supplemental or drink-mix intake should be considered together. This page does not prescribe a
  dose. Consult a qualified healthcare professional before starting or changing electrolyte supplements or high-sodium
  products, especially if pregnant, nursing, under 18, taking medication, managing blood pressure, kidney disease,
  heart disease, fluid restrictions, or a medical condition.
safetyNotes: >
  According to NIH materials, high sodium intake may be a concern for some people, including those managing blood
  pressure, heart disease, or kidney disease. Some electrolyte drink mixes list 500–1,000 mg sodium per serving — far
  above lower-sodium daily-hydration formulas. High supplemental potassium may be inappropriate for some individuals,
  including those with impaired kidney function or taking certain medications. Electrolyte drink mixes, powders, and
  tablets are not a substitute for medical care, oral rehydration therapy, IV fluids, or treatment of dehydration,
  electrolyte imbalance, heat illness, vomiting, diarrhea, or illness-related fluid loss. Product labels, warnings,
  formulas, and sweeteners can change — verify the current label before use.
interactions: >
  Sodium, potassium, and magnesium can interact with several medication classes, including diuretics, blood pressure
  medications, and other prescriptions. This summary is not a complete interaction list. Consult a qualified healthcare
  professional or pharmacist if you take prescription medications or manage kidney disease, heart disease, or a
  chronic medical condition.
