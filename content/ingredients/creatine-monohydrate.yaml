evidenceSummary: >
  Creatine monohydrate is the most widely studied and commonly used supplemental form of creatine. According to NIH
  Office of Dietary Supplements materials, creatine supplements may help improve performance during repeated short
  bursts of high-intensity effort when used alongside appropriate training. Research has examined creatine in sport and
  exercise contexts; individual responses vary. SuppCheckr summarizes label and product-comparison information — not
  medical advice.
typicalDosageRange: >
  NIH health-professional materials describe common research protocols that include a short-term loading phase (often
  about 20 g/day split into smaller doses for roughly 5–7 days) followed by a maintenance intake (often about 3–5
  g/day), or lower daily doses without a loading phase. Product labels and serving sizes differ. Consult a qualified
  healthcare professional before changing supplement use, especially if pregnant, nursing, under 18, taking medication,
  or managing a medical condition.
safetyNotes: >
  According to NIH consumer-oriented materials, creatine has been studied for short- and longer-term use in healthy
  adults, with commonly reported issues such as weight gain related to water retention and occasional digestive
  discomfort in some people. Creatine is not a substitute for medical care. People with kidney disease or other medical
  conditions should consult a qualified healthcare professional before use.
interactions: >
  Based on publicly available NIH and consensus summaries, creatine is widely studied in healthy active populations, but
  interactions with medications or conditions are not fully covered here. Consult a qualified healthcare professional if
  you take prescription medications or manage a chronic condition.
