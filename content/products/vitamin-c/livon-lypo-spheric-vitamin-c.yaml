pros:
  - >-
    Official LivOn Supplement Facts image on the brand product page shows 1,000 mg vitamin C as sodium ascorbate per 5.7 mL
    packet with phospholipid and sodium amounts disclosed (Phase 8G confirmed against prior Vitacost mirror).
  - Representative liposomal-format product with locked 30-packet carton and UPC 858514001002.
  - One packet equals one labeled vitamin C serving for dose comparison purposes.
cons:
  - >-
    Among the highest observed price per 500 mg vitamin C in this draft cluster (~$0.72/500 mg at cited price) — expected
    for liposomal positioning; editorial context only, not an automatic dismissal.
  - Brand marketing emphasizes elite absorption and delivery — SuppCheckr scores label clarity, not absorption superiority.
  - Contains ethanol preservative and soy-derived phospholipids; liquid packet format adds serving friction.
  - No verified third-party testing documentation captured for this SKU in Phase 8E.
bestFor:
  - >-
    Buyers comparing a liposomal vitamin C example with clear 1,000 mg sodium ascorbate per packet and disclosed
    phospholipid/sodium amounts on Supplement Facts.
avoidIf:
  - You are sensitive to alcohol/ethanol in supplement formulas or avoid soy-derived ingredients.
  - You require verified third-party certification documentation before purchase.
  - Budget value per 500 mg vitamin C is your primary criterion.
labelTransparencyNotes: >
  Locked 30-packet carton; UPC 858514001002. Phase 8G confirmed structured Supplement Facts on the official LivOn product
  page (December 2025 label image) match the prior Vitacost mirror citation.
evidenceNotes: >
  SuppCheckr score uses the vitamin C scoring profile (Phase 8C). Key drivers: clear sodium ascorbate dose and
  liposomal blend disclosure on Supplement Facts — offset by high claim-risk absorption marketing, high price per 500 mg
  vitamin C, liquid-packet complexity, and unknown testing verification. Liposomal format is compared on label
  transparency — not ranked as best absorbed.
