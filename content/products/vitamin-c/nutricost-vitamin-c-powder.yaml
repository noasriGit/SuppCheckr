pros:
  - >-
    Supplement Facts on the Nutricost product page list pure ascorbic acid powder with 1,000 mg vitamin C per 1 g scoop
    and no other ingredients.
  - Lowest observed price per 500 mg vitamin C in this draft cluster at the cited 2026-07-07 price check.
  - Scoop-based powder allows flexible serving adjustments when label math is followed.
cons:
  - Powder taste and GI tolerance vary by individual; acidic taste is common for ascorbic acid powders.
  - Nutricost also sells 0.5 lb and 2 lb sizes — confirm weight before purchase.
  - Third-party testing is marketed but not verified with a captured certificate URL for this SKU.
bestFor:
  - >-
    Buyers comparing a pure ascorbic acid powder with strong dated price per 500 mg vitamin C and minimal formula
    complexity.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - You prefer capsules or tablets over measuring powder servings.
  - You are sensitive to acidic supplement tastes or have not tolerated ascorbic acid powder before.
labelTransparencyNotes: >
  Locked 1 lb (454 g) SKU with ~454 servings at 1 g scoop per Nutricost Supplement Facts. Nutricost also sells 0.5 lb and
  2 lb variants — confirm container weight and UPC before purchase.
evidenceNotes: >
  SuppCheckr score uses the vitamin C scoring profile (Phase 8C). Key drivers: pure ascorbic acid, clear 1,000 mg per
  scoop, additive-free label, and best observed price per 500 mg vitamin C in this cluster — offset by claimed (not
  verified) testing and powder-format serving/tolerance variables.
