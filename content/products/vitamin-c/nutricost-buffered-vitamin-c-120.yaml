pros:
  - >-
    Official Nutricost Supplement Facts image discloses 1,000 mg vitamin C per 2-capsule serving as sodium, calcium, and
    magnesium ascorbates with mineral amounts listed (95 mg sodium, 30 mg calcium, 25 mg magnesium per serving).
  - Lower observed bottle price than NOW Buffered C-1000 at the cited 2026-07-07 price check.
  - Nutricost markets third-party testing (claimed — not verified with a captured certificate for this SKU).
cons:
  - Two capsules per serving is less convenient than one-tablet buffered options in this draft cluster.
  - Two-capsule serving includes corn starch and calcium laurate among excipients versus simpler buffered tablet options.
  - Brand copy includes immune-health marketing — SuppCheckr cites label facts only, not immunity outcomes.
  - Buffered form marketing elsewhere often implies gentleness or absorption — SuppCheckr does not endorse those claims.
bestFor:
  - >-
    Buyers comparing a buffered/mineral ascorbate capsule with disclosed 1,000 mg vitamin C per serving and a dated
    manual price per 500 mg vitamin C.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - You prefer a one-unit serving without taking two capsules.
  - You need a single-mineral buffered ascorbate (for example sodium ascorbate only) rather than a multi-mineral blend.
labelTransparencyNotes: >
  Locked 120-capsule SKU (60 servings at 2 capsules per serving). Phase 8G confirmed the official Nutricost Supplement
  Facts image lists vitamin C as sodium, calcium, and magnesium ascorbates with disclosed mineral amounts per serving.
evidenceNotes: >
  SuppCheckr score uses the vitamin C scoring profile (Phase 8C). Selected over NOW Buffered C-1000 in Phase 8E for brand
  diversity while covering the buffered/mineral ascorbate bucket. Key drivers: clear 1,000 mg buffered dose with
  explicit multi-mineral ascorbate disclosure on the official Nutricost SFP image and claimed testing — offset by
  two-capsule serving, corn-starch excipients, immune marketing, and mid-tier buffered price per 500 mg vitamin C.
