pros:
  - >-
    Target listing Supplement Facts show 1,000 mg vitamin C per 1 tablet serving; Target page displays a USP Verified
    program badge (retailer-sourced claim — not confirmed in the USP Verified Products Program database in Phase 8G).
  - Widely available retail SKU (UPC 031604014896) with mid-range observed price per 500 mg vitamin C in this cluster.
  - One-tablet serving supports straightforward dose and value comparison.
cons:
  - >-
    Nature Made brand product page for Vitamin C 1000 mg Tablets showed discontinued status during Phase 8D/8E research —
    label and price locked via Target listing with retailer-sourced label caveat.
  - Tablet includes multiple excipients including polyethylene glycol versus simpler capsule formulas.
  - Target and brand marketing include immune and upper-respiratory support copy — SuppCheckr cites label facts only.
  - >-
    Phase 8G USP Verified Products Program database search found no listing for Nature Made Extra Strength Vitamin C 1000
    mg Tablets — USP status remains a retailer claim only, not independently verified.
bestFor:
  - >-
    Buyers comparing a mainstream 1,000 mg ascorbic acid tablet with a USP Verified program badge displayed on a major
    retailer listing — understanding the badge is a retailer claim not confirmed in the USP database.
avoidIf:
  - You require an official brand-hosted Supplement Facts panel or a USP Verified Products Program database listing before purchase.
  - You prefer a formula with fewer tablet excipients.
labelTransparencyNotes: >
  Locked UPC 031604014896 / TCIN 11010061 — 100 tablets. Nature Made brand site listed this product discontinued while
  Target continued selling a USP Verified SKU at research time — confirm active formulation and label have not changed
  before publication.
evidenceNotes: >
  SuppCheckr score uses the vitamin C scoring profile (Phase 8C). Key drivers: clear 1,000 mg dose and mid-range price per
  500 mg vitamin C — offset by retailer-sourced label (brand PDP discontinued), USP Verified badge on Target not matched
  in the USP database (testing downgraded to claimed in Phase 8G), multiple tablet excipients, and immune marketing copy.
