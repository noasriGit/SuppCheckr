pros:
  - >-
    Target listing Supplement Facts show 1,000 mg vitamin C per 1 tablet serving with USP Verified program badge on the
    product page.
  - Widely available retail SKU (UPC 031604014896) with mid-range observed price per 500 mg vitamin C in this cluster.
