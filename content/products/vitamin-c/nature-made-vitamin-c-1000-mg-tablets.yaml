cons:
  - >-
    Nature Made brand product page for Vitamin C 1000 mg Tablets showed discontinued status during Phase 8D/8E research —
    label and price locked via Target listing with retailer-sourced label caveat.
  - Tablet includes multiple excipients including polyethylene glycol versus simpler capsule formulas.
  - Target and brand marketing include immune and upper-respiratory support copy — SuppCheckr cites label facts only.
  - Independent USP Verified Products Program database match not yet captured — confirm before publication upgrade.
bestFor:
  - >-
    Buyers comparing a mainstream 1,000 mg ascorbic acid tablet with USP Verified program documentation cited on a
    major retailer listing.
avoidIf:
  - You require an official brand-hosted Supplement Facts panel or independent USP database listing before purchase.
  - You prefer a formula with fewer tablet excipients.
labelTransparencyNotes: >
  Locked UPC 031604014896 / TCIN 11010061 — 100 tablets. Nature Made brand site listed this product discontinued while
  Target continued selling a USP Verified SKU at research time — confirm active formulation and label have not changed
  before publication.
evidenceNotes: >
  SuppCheckr score uses the vitamin C scoring profile (Phase 8C). Key drivers: clear 1,000 mg dose, USP Verified claim
