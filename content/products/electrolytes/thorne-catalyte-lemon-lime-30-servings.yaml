pros:
  - >-
    NSF Certified for Sport listing (id 1286726) matched to Thorne Catalyte Lemon Lime powder — only shortlist product
    with verified sport certification in Phase 14C.
  - >-
    Cited Supplement Facts disclose sodium, potassium, magnesium (with form), calcium, chloride, and <1 g sugar per scoop
    (UPC 693749006299).
  - Moderate sodium (485 mg) with multi-electrolyte disclosure and identified mineral forms.
cons:
  - >-
    Supplement Facts were checked against a Vitacost retailer label (UPC 693749006299) because the official thorne.com PDP
    did not expose a complete panel during review; iHerb corroborates the same values. NSF database calorie/sugar summary
    differs from retailer Supplement Facts — see labelTransparencyNotes.
  - Formula includes taurine (500 mg), B vitamins, vitamin C, zinc, and chromium beyond core electrolytes.
  - Scoop tub format is less portable than single-serve sticks; scoop not sold separately if lost.
  - Practitioner/sports recovery marketing copy on brand and retailer pages — SuppCheckr cites label and certification facts only.
bestFor:
  - >-
    Shoppers comparing an NSF Certified for Sport electrolyte powder with disclosed sodium, potassium, magnesium, and
    chloride per serving — understanding certification does not prove personal hydration outcomes.
avoidIf:
  - You require an official brand-hosted Supplement Facts image before purchase.
  - You prefer a single-serve stick without scooping from a tub.
  - You want a minimal-ingredient electrolyte formula without taurine or added vitamins.
labelTransparencyNotes: >
  Locked Lemon Lime 11.01 oz (312 g) tub, 30 servings at 1 scoop (10.4 g), UPC 693749006299. NSF database lists 312 g
  package, powder form, Lemon Lime flavor (listing id 1286726). Supplement Facts locked from Vitacost retailer label
  (Phase 14F re-check, 2026-07-15) with iHerb corroboration (same UPC/panel) because the official thorne.com PDP did
  not expose a complete panel. Calorie/sugar variance across sources: NSF Certified for Sport database nutritional summary
  cites 20 cal / 3 g sugar / 5 g carbohydrate per serving; Vitacost and iHerb Supplement Facts cite 30 cal / <1 g sugar
  / 5 g carbohydrate — label-grounded retailer values retained.
evidenceNotes: >
  SuppCheckr score uses the electrolytes scoring profile (Phase 14C). Key drivers: verified NSF Certified for Sport
  listing, strong electrolyte and mineral-form transparency — offset by retailer-sourced label lock, complex multi-nutrient
  stack, scoop tub practicality, and sports-recovery brand copy. Certification reflects testing program membership for
  the SKU — not medical suitability.
