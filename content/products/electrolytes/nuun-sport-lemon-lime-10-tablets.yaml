pros:
  - >-
    Official Nuun Sport Nutrition Facts disclose sodium, potassium, magnesium, calcium, and chloride per tablet —
    stronger five-electrolyte transparency than many stick formats.
  - Lowest observed price per serving among the Phase 14C shortlist at the cited 2026-07-15 check ($0.75).
  - Portable tablet format with 1 g sugar from dextrose clearly listed.
cons:
  - Tablet must be dissolved in water — modest serving friction versus ready-to-mix sticks.
  - Brand copy references rehydration and workout enhancement — SuppCheckr cites label facts only.
  - No verified third-party sport certification documented for this SKU.
  - Color and flavor additives (beet juice, avocado oil) present in ingredient list.
bestFor:
  - >-
    Shoppers comparing an electrolyte tablet with full sodium/potassium/magnesium/calcium/chloride disclosure and a lower
    observed price per serving.
avoidIf:
  - You prefer a stick pack or scoop format without dissolving a tablet.
  - You require verified third-party certification documentation before purchase.
  - You need a sugar-free formula (this SKU lists 1 g sugar per serving).
labelTransparencyNotes: >
  Locked Lemon Lime flavor, single tube with 10 tablets. Nuun lists flavor-specific ingredient order on the product page;
  electrolyte amounts per serving are consistent across Sport flavors per brand Nutrition Facts block cited.
evidenceNotes: >
  SuppCheckr score uses the electrolytes scoring profile (Phase 14C). Key drivers: strong electrolyte transparency
  including chloride, official brand Nutrition Facts, and best shortlist $/serving — offset by tablet serving friction,
  modest sugar/additive load, unknown testing, and moderate rehydration marketing copy.
