pros:
  - >-
    Official Liquid I.V. Nutrition Facts list 500 mg sodium, 370 mg potassium, and 11 g total sugars per 16 g stick —
    useful for sugar-containing stick comparisons.
  - Single stick serving with disclosed calories (45) supports label literacy.
  - Widely available mainstream hydration stick format.
cons:
  - >-
    Magnesium is not disclosed on the US Nutrition Facts panel for Hydration Multiplier — do not assume magnesium
    content from marketing copy.
  - 11 g sugar per serving is material for shoppers comparing sugar-free formulas.
  - >-
    Brand marketing includes “Hydration Multiplier,” faster-hydration, and ORS-adjacent FAQ language — high claim-risk;
    SuppCheckr cites label facts only.
  - No verified third-party sport certification documented for this SKU.
  - Similar MSRP per serving to LMNT despite different sodium/sugar profile ($1.56 vs $1.50 at cited check).
bestFor:
  - >-
    Shoppers comparing a sugar-containing electrolyte stick with disclosed sodium, potassium, and sugar grams per serving
    — not outcome guarantees.
avoidIf:
  - You require magnesium amount disclosure on the label before purchase.
  - You prefer a sugar-free or lower-sugar electrolyte stick.
  - You require verified third-party certification documentation.
labelTransparencyNotes: >
  Locked Lemon Lime flavor, 16 stick packs per pouch (16 g per stick). Magnesium is absent from the cited US Nutrition
  Facts panel — documented as not disclosed, not zero. B vitamins also appear on the panel but are secondary to core
  electrolyte comparison fields.
evidenceNotes: >
  SuppCheckr score uses the electrolytes scoring profile (Phase 14C). Key drivers: clear sodium/potassium/sugar
  disclosure — heavily offset by high claim-risk brand positioning, magnesium not on label, 11 g sugar, unknown testing,
  and premium $/serving. “Hydration Multiplier” is a product name/marketing phrase, not evidence of superior hydration.
