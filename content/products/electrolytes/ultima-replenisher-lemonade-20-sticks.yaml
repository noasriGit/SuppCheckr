pros:
  - >-
    Official Ultima Nutrition Facts list 55 mg sodium, 250 mg potassium, 100 mg magnesium, 47 mg calcium, and 78 mg
    chloride per stick with 0 g sugar and 0 calories.
  - Lower sodium than high-sodium stick competitors — useful for daily-hydration label comparisons.
  - Sugar-free stevia-sweetened formula with broad mineral disclosure on the cited panel.
cons:
  - >-
    Added vitamins and minerals (vitamin C, zinc, manganese, phosphorus) beyond core electrolytes — formula is not a
    minimal-ingredient profile.
  - Brand marketing references daily hydration and body replenishment — SuppCheckr does not treat as dehydration treatment.
  - No verified third-party sport certification documented for this SKU.
  - Mid-tier $1.05/serving among shortlist stick formats.
bestFor:
  - >-
    Shoppers comparing a lower-sodium, sugar-free electrolyte stick with disclosed potassium and magnesium and zero
    calories on the label.
avoidIf:
  - You need a high-sodium electrolyte stick for heavy sweat replacement contexts — label shows 55 mg sodium per serving.
  - You prefer a minimal-ingredient electrolyte formula without added vitamins.
  - You require verified third-party certification documentation before purchase.
labelTransparencyNotes: >
  Locked Lemonade flavor, 20 stick packs per box. Ultima also sells 30- and 90-serving canisters — confirm stick count
  and flavor before purchase. Phosphorus (70 mg) and zinc/manganese also appear on the cited Nutrition Facts.
evidenceNotes: >
  SuppCheckr score uses the electrolytes scoring profile (Phase 14C). Key drivers: strong sugar-free label, broad
  electrolyte disclosure, and lower sodium positioning — offset by multi-vitamin/mineral stack, unknown testing, and
  daily-hydration marketing copy. Low sodium is a label attribute, not proof of medical suitability.
