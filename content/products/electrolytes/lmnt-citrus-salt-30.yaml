pros:
  - >-
    Official LMNT product and ingredients pages list 1,000 mg sodium, 200 mg potassium, and 60 mg magnesium per stick
    with 0 g sugar and 0 calories.
  - Single stick-pack serving supports straightforward per-serving electrolyte and price comparison.
  - Sugar-free stevia-sweetened formula with clearly disclosed mineral amounts.
cons:
  - >-
    High sodium per serving (1,000 mg) may be inappropriate for some people managing blood pressure, kidney disease,
    heart disease, fluid restrictions, or certain medications — general NIH sodium context only.
  - No verified third-party sport certification documented for this SKU.
  - Brand marketing includes keto/fasting lifestyle positioning — SuppCheckr cites label facts only, not demographic suitability.
  - Chloride is present as mineral salts but not broken out in mg on the consumer-facing panel.
bestFor:
  - >-
    Shoppers comparing a high-sodium, sugar-free electrolyte stick pack with clearly disclosed sodium, potassium, and
    magnesium per serving — understanding individual sodium tolerance varies.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - >-
    You are managing blood pressure, kidney disease, heart disease, fluid restrictions, or a medical condition without
    guidance from a qualified healthcare professional.
  - You prefer a lower-sodium daily hydration formula.
labelTransparencyNotes: >
  Locked Citrus Salt flavor, 30 stick packs per box (~6 g powder per stick). LMNT states electrolyte amounts are
  consistent across standard flavored drink mixes; confirm flavor and count before purchase. Chloride from sodium and
  potassium salts is not listed as a separate mg line.
evidenceNotes: >
  SuppCheckr score uses the electrolytes scoring profile (Phase 14C). Key drivers: excellent sodium/potassium/magnesium
  dose transparency and sugar-free label — offset by high sodium claim-risk context, unknown testing, premium $1.50/serving
  MSRP, and keto/fasting brand copy. Score reflects label quality — not medical suitability or hydration outcomes.
