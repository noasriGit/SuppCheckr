pros:
  - >-
    Supplement Facts list magnesium malate with both compound weight (1000 mg malate) and 113 mg elemental magnesium per
    tablet.
  - Single-form malate product with a one-tablet serving size on the cited label.
  - Mid-range observed price per 100 mg elemental magnesium in this five-product comparison set.
cons:
  - Lower elemental magnesium per tablet (113 mg) than many one-capsule products in this cluster.
  - >-
    Brand product page includes energy- and Krebs-cycle-adjacent marketing — SuppCheckr cites label facts only, not
    energy or fatigue outcomes.
  - No verifiable third-party testing documentation captured for this SKU in Phase 4D-2.
bestFor:
  - >-
    Buyers who want a malate-form tablet with compound weight and elemental magnesium both disclosed on Supplement
    Facts.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - You need a higher elemental magnesium amount per single unit without taking additional tablets.
labelTransparencyNotes: >
  Locked NOW SKU 1300 / UPC 733739013002 — 180 tablets. Brand page lists a suggested use of up to 3 tablets daily;
  SuppCheckr price normalization uses the 1-tablet Supplement Facts serving (113 mg elemental magnesium).
evidenceNotes: >
  SuppCheckr score uses the magnesium scoring profile (Phase 4D-3). Key drivers: malate form with both compound
  weight (1000 mg malate) and 113 mg elemental magnesium disclosed on Supplement Facts, plus one-tablet serving — offset
  by unknown third-party testing, brand energy/Krebs-cycle marketing risk, and lower elemental mg per tablet. SuppCheckr
  does not treat malate as an energy or pain treatment.
