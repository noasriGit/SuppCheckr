pros:
  - Third-party tested — NSF Certified for Sport listing captured for this SKU (90 vegetarian capsules, 1-capsule serving).
  - Supplement Facts on the brand page list magnesium as magnesium glycinate with 120 mg elemental magnesium per capsule.
  - Single primary magnesium form on the label; capsule count and serving size are straightforward.
cons:
  - Higher observed price per 100 mg elemental magnesium than budget citrate or oxide options in this draft cluster.
  - 120 mg elemental magnesium per capsule is a lower per-serving dose than some glycinate products that list 200 mg per serving.
  - Brand marketing includes athlete and wellness positioning — SuppCheckr does not mirror sleep, anxiety, or recovery outcome claims.
bestFor:
  - Buyers who prioritize a glycinate-form label with a verifiable NSF Certified for Sport listing for this SKU.
avoidIf:
  - You need the lowest price per 100 mg elemental magnesium in this cluster.
  - You require a higher elemental magnesium amount per single-capsule serving without taking additional capsules.
labelTransparencyNotes: >
  Locked SKU KA202599-90 / UPC 310539035521 — 90 vegetarian capsules. Brand product page Supplement Facts list 120 mg
  magnesium (elemental) as magnesium glycinate per 1-capsule serving and 90 servings per container. Label directions
  allow 1–4 capsules daily; SuppCheckr price math uses the 1-capsule serving size shown on Supplement Facts.
evidenceNotes: >
  Draft SuppCheckr score uses the magnesium scoring profile (Phase 4D-3). Key drivers: NSF Certified for
  Sport verification, clear glycinate form and 120 mg elemental magnesium per capsule, and simple capsule
  formula — offset by higher price per 100 mg elemental magnesium and lower per-capsule dose than some
  alternatives. Scores reflect label clarity and NSF listing documentation, not personal medical suitability.
