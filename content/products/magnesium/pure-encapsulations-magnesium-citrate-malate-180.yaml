pros:
  - >-
    Supplement Facts on the cited listing show 120 mg magnesium (elemental) as magnesium citrate/malate per 1-capsule
    serving.
  - >-
    Transparent mixed-form label — both citrate and malate are named, with total elemental magnesium stated (no per-form
    mg split).
  - One-capsule serving size simplifies dose and price-per-serving comparisons within this five-product comparison set.
cons:
  - >-
    Label source is a retailer listing; official Pure Encapsulations product page for this SKU was not confirmed in
    Phase 4D-2.
  - Combined citrate/malate form does not disclose separate elemental amounts per salt on the label.
  - Higher observed price per 100 mg elemental magnesium than budget citrate or oxide options in this cluster.
  - >-
    Retailer marketing copy includes cardiometabolic and neurocognitive positioning — SuppCheckr does not repeat those
    as product benefits.
bestFor:
  - >-
    Buyers who want a mixed citrate/malate label with clear total elemental magnesium per capsule when a dedicated
    malate-only SKU is not required.
avoidIf:
  - You require an official brand-hosted Supplement Facts image as the sole label source.
  - You need verified third-party testing documentation before purchase.
  - You want the lowest price per 100 mg elemental magnesium in this cluster.
labelTransparencyNotes: >
  Locked UPC 766298004365 / SKU MCM1 — 180 capsules. Supplement Facts on the cited Vitacost listing match Target listing
  facts checked in Phase 4D-1 research (120 mg elemental per capsule). Per-form elemental magnesium is not split on the
  label. Label directions allow 1–4 capsules daily with food.
evidenceNotes: >
  SuppCheckr score uses the magnesium scoring profile (Phase 4D-3). Key drivers: transparent mixed citrate/malate
  form with 120 mg elemental magnesium per capsule and one-capsule serving — offset by retailer-sourced Supplement Facts
  (official brand page not confirmed), no per-form elemental mg split, unknown testing, and higher price per 100 mg
  elemental than budget options. This product occupies the V1 threonate fallback slot; no magnesium L-threonate product
  review is included.
