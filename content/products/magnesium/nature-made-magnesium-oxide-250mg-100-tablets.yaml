pros:
  - >-
    Supplement Facts on the cited Target listing show 250 mg magnesium (elemental) as magnesium oxide per 1-tablet
    serving.
  - Lowest observed price per 100 mg elemental magnesium among the five comparison-set products at the cited price check.
  - Single-form oxide label with straightforward one-tablet serving size.
cons:
  - >-
    According to NIH ODS materials, some magnesium forms including oxide are more commonly associated with laxative
    effects at higher supplemental intakes; individual GI tolerance varies.
  - Tablet includes multiple excipients and color additives versus simpler capsule formulas in this cluster.
  - No verified third-party testing or USP certification documentation captured for this SKU in Phase 4D-2.
  - >-
    Retailer marketing includes heart, bone, and nerve wellness copy — SuppCheckr summarizes label facts, not condition
    support.
bestFor:
  - >-
    Buyers comparing a common budget oxide example using label-stated elemental magnesium and dated price per 100 mg
    elemental.
avoidIf:
  - You require verified third-party testing or USP certification documentation before purchase.
  - You prefer a formula with fewer tablet excipients or a non-oxide magnesium form.
  - >-
    You have kidney disease or take medications — consult a qualified healthcare professional before use (per label
    caution and NIH context).
labelTransparencyNotes: >
  Locked UPC 031604012694 / TCIN 91641244 — 100 tablets. Target listing Supplement Facts match Phase 4D-1 research for
  250 mg elemental magnesium as magnesium oxide per tablet and 100 servings per bottle. Label caution advises
  consultation if you have kidney disease or take medication.
evidenceNotes: >
  SuppCheckr score uses the magnesium scoring profile (Phase 4D-3). Key drivers: clear oxide form, 250 mg
  elemental magnesium per tablet, and lowest observed price per 100 mg elemental in this cluster — offset by unknown
  USP/testing verification, multiple tablet excipients, Target-sourced label, and oxide GI caveats. Oxide value framing
  uses elemental mg and dated price only — not absorption superiority or dismissal of the form.
