pros:
  - >-
    Supplement Facts on the Nutricost product page list 420 mg elemental magnesium as magnesium citrate per 4-capsule
    serving.
  - Among the lower observed price-per-100-mg-elemental values in this five-product comparison set at the cited price check.
  - Magnesium citrate form is clearly identified on the label.
cons:
  - Four capsules per serving may be less convenient than one-capsule or one-tablet servings.
  - Third-party testing is marketed but not verified with a captured certificate URL for this SKU.
  - >-
    According to NIH ODS materials, supplemental magnesium at higher intakes can cause GI effects in some people;
    individual tolerance varies.
bestFor:
  - >-
    Buyers looking for a citrate-form label with explicit elemental magnesium disclosure and a lower observed price per
    100 mg elemental.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - You prefer a single-capsule serving without taking four capsules.
labelTransparencyNotes: >
  Locked 120-capsule SKU (30 servings at 4 capsules per serving). Nutricost also sells 60- and 240-capsule sizes —
  confirm bottle count before purchase. Elemental magnesium is stated on the cited Supplement Facts panel.
evidenceNotes: >
  SuppCheckr score uses the magnesium scoring profile (Phase 4D-3). Key drivers: clear citrate form, explicit 420
  mg elemental magnesium per serving, and strong price per 100 mg elemental value — offset by four-capsule serving size
  and third-party testing claimed but not verified with a captured certificate. Citrate GI tolerance context is general
  NIH background, not a product treatment claim.
