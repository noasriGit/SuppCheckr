pros:
  - Bulk value option — among the lowest observed price-per-5g values in this draft cluster.
  - Simple formula — brand Supplement Facts list micronized creatine monohydrate with no other ingredients.
  - Clear 5 g per serving on Supplement Facts (2 tsp ≈ 5 g).
cons:
  - Third-party testing is referenced in marketing but not verified with a captured certificate URL.
  - Volume-based serving (teaspoon) and separate maintenance directions may reduce label clarity for some buyers.
  - Bulk bag format may be less convenient than smaller tubs for first-time buyers.
bestFor:
  - Buyers prioritizing bulk container value with a single-ingredient monohydrate label.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - You prefer capsules or pre-portioned scoops with simpler directions only.
labelTransparencyNotes: >
  Brand page lists 2 tsp ≈ 5 g on Supplement Facts and 200 servings for the 1 kg (CM1KG) variant at $31.97 on
  2026-06-26. Suggested use also mentions a 7 g maintenance option.
evidenceNotes: >
  Monohydrate micronized powder aligns with commonly studied creatine context. Value scoring uses cited manual price at
  draft time.
