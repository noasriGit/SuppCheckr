pros:
  - Clear label states 5 g creatine monohydrate per scoop on cited Supplement Facts.
  - Simple single-ingredient formula on cited label (micronized creatine monohydrate).
  - Among the lower observed price-per-5g values in this draft cluster at the cited retailer check.
cons:
  - Third-party testing is marketed but not verified with a captured certificate in Phase 2D.
  - Nutricost sells many flavored creatine SKUs; buyers should confirm the unflavored 500 g SKU.
bestFor:
  - Buyers prioritizing a budget unflavored monohydrate powder with clear grams-per-serving on the label.
avoidIf:
  - You require verified third-party certification documentation before purchase.
  - You need a non-powder format (see capsule options in this category).
labelTransparencyNotes: >
  The cited iHerb listing for Performance Creatine Monohydrate 500 g shows 5 g creatine monohydrate per 5 g scoop and
  100 servings per container.
evidenceNotes: >
