pros:
  - Capsule format for buyers who prefer pills over mixing powder.
  - Clear label states 4.5 g creatine monohydrate per six-capsule serving.
  - Third-party tested — Informed Sport seal documented on NOW product page.
cons:
  - Serving provides 4.5 g creatine, not 5 g — compare using price-per-5g normalization.
  - Six capsules per serving may be inconvenient versus one scoop powders.
  - Higher normalized price per 5 g creatine than most powders in this draft cluster.
bestFor:
  - Buyers who want creatine monohydrate in capsule form with Informed Sport documentation on the brand page.
avoidIf:
  - You want exactly 5 g creatine per serving without taking six capsules.
  - You prioritize the lowest price per 5 g creatine equivalent.
labelTransparencyNotes: >
  Brand and Vitacost listings show 4.5 g creatine monohydrate per six-capsule serving and 20 servings per 120-capsule
  bottle. Label directions include loading-phase language.
evidenceNotes: >
  Monohydrate form in capsules aligns with studied creatine context. Dose scoring reflects 4.5 g per serving versus
  common 5 g powder servings.
